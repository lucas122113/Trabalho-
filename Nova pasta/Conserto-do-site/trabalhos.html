      <th>Destino</th>

      <th>Preço</th>
    </tr>
  </thead>
  <tbody></tbody>

<script>
  const viagens = [
    { destino: "Rio de Janeiro", duracao: "3 dias", preco: 1200 },
    { destino: "Salvador", duracao: "5 dias", preco: 2000 },
    { destino: "Foz do Iguaçu", duracao: "4 dias", preco: 1800 },
    { destino: "Gramado", duracao: "6 dias", preco: 2500 }
  ];

  const tbody = document.querySelector("#tabela tbody");

  viagens.forEach(v => {
    const linha = document.createElement("tr");

    linha.innerHTML = `
      <td>${v.destino}</td>
      <td>${v.duracao}</td>
      <td>R$ ${v.preco.toFixed(2)}</td>
    `;

    tbody.appendChild(linha);
  });
</script>
